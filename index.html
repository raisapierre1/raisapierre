<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raisa Pierre — Senior UX/UI Designer & Researcher</title>
    <meta name="description" content="Portfolio of Raisa Pierre — Senior UX/UI Designer & Researcher based in Stockholm, Sweden. New site coming soon.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0a0a0a;
            color: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            text-align: center;
            max-width: 560px;
        }

        .name {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .role {
            font-size: 1rem;
            font-weight: 300;
            color: #a0a0a0;
            margin-bottom: 3rem;
        }

        .divider {
            width: 40px;
            height: 1px;
            background-color: #333;
            margin: 0 auto 3rem;
        }

        .message {
            font-size: 1.125rem;
            font-weight: 400;
            color: #d4d4d4;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .submessage {
            font-size: 0.875rem;
            font-weight: 300;
            color: #666;
            margin-bottom: 3rem;
        }

        .links {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .links a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            transition: color 0.2s ease;
        }

        .links a:hover {
            color: #fafafa;
        }

        @media (max-width: 480px) {
            .name {
                font-size: 1.5rem;
            }

            .links {
                gap: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="name">Raisa Pierre</h1>
        <p class="role">Senior UX/UI Designer & Researcher</p>
        <div class="divider"></div>
        <p class="message">New portfolio coming soon.</p>
        <p class="submessage">Stockholm, Sweden</p>
        <div class="links">
            <a href="https://linkedin.com/in/raisapierre" target="_blank" rel="noopener">LinkedIn</a>
            <a href="mailto:raisapierre@gmail.com">Email</a>
        </div>
    </div>
</body>
</html>
